name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install frontend dependencies
        run: npm install

      - name: Download pdfium.dll
        shell: pwsh
        run: |
          $pdfiumDir = "src-tauri/resources/pdfium"
          if (!(Test-Path "$pdfiumDir/pdfium.dll")) {
            New-Item -ItemType Directory -Force -Path $pdfiumDir | Out-Null
            New-Item -ItemType Directory -Force -Path "pdfium-temp" | Out-Null
            $headers = @{ "User-Agent" = "COMIC-Bridge-CI" }
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/nicehash/pdfium-binaries/releases/latest" -Headers $headers
            $asset = $release.assets | Where-Object { $_.name -match "win.*x64" } | Select-Object -First 1
            if (-not $asset) { throw "No matching pdfium asset found in release $($release.tag_name)" }
            Write-Host "Downloading $($asset.name)"
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "pdfium-archive"
            if ($asset.name -match "\.tgz$|\.tar\.gz$") {
              tar -xzf "pdfium-archive" -C "pdfium-temp"
            } else {
              Expand-Archive -Path "pdfium-archive" -DestinationPath "pdfium-temp" -Force
            }
            $dllPath = Get-ChildItem -Path "pdfium-temp" -Recurse -Filter "pdfium.dll" | Select-Object -First 1
            if (-not $dllPath) { throw "pdfium.dll not found in archive" }
            Copy-Item $dllPath.FullName "$pdfiumDir/pdfium.dll"
            Remove-Item -Recurse -Force "pdfium-temp", "pdfium-archive"
            Write-Host "pdfium.dll installed successfully"
          }

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Comic-Bridge v__VERSION__"
          releaseBody: |
            Comic-Bridge v__VERSION__

            インストーラーをダウンロードして実行してください。
            既存のバージョンがインストールされている場合、アプリ内の自動アップデートで更新されます。
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          includeUpdaterJson: true
